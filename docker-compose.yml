# Local Airflow for investor profiling DAGs.
# Usage:
#   echo "AIRFLOW_UID=$(id -u)" > .env
#   docker compose up --build -d
#   open http://localhost:8080 (admin / admin)

x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow/include
    # Pipeline + dbt (override in .env or docker-compose overrides file)
    DATABRICKS_HOST: ${DATABRICKS_HOST:-}
    DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH:-}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
    DATABRICKS_CATALOG: ${DATABRICKS_CATALOG:-main}
    DATABRICKS_SCHEMA: ${DATABRICKS_SCHEMA:-investor_profiling}
    MYSQL_HOST: ${MYSQL_HOST:-}
    MYSQL_PORT: ${MYSQL_PORT:-3306}
    MYSQL_USER: ${MYSQL_USER:-}
    MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
    MYSQL_DATABASE: ${MYSQL_DATABASE:-}
    MYSQL_INVESTORS_QUERY: ${MYSQL_INVESTORS_QUERY:-SELECT investor_id, investor_name, website AS source_website FROM investors}
    JINA_API_KEY: ${JINA_API_KEY:-}
    JINA_READER_BASE_URL: ${JINA_READER_BASE_URL:-https://r.jina.ai}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
    DATABRICKS_MODEL_ENDPOINT: ${DATABRICKS_MODEL_ENDPOINT:-}
    LLM_EXTRACTION_MODEL: ${LLM_EXTRACTION_MODEL:-gpt-4o-mini}
    LLM_CLASSIFICATION_MODEL: ${LLM_CLASSIFICATION_MODEL:-gpt-4o-mini}
    LLM_BUILT_WORLD_MODEL: ${LLM_BUILT_WORLD_MODEL:-gpt-4o-mini}
    LLM_THEME_MODEL: ${LLM_THEME_MODEL:-gpt-4o-mini}
    LLM_MAIN_CATEGORY_MODEL: ${LLM_MAIN_CATEGORY_MODEL:-gpt-4o-mini}
    LLM_SUBCATEGORY_MODEL: ${LLM_SUBCATEGORY_MODEL:-gpt-4o-mini}
    CLASSIFIER_VERSION: ${CLASSIFIER_VERSION:-v1}
    DBT_PROJECT_DIR: /opt/airflow/dbt
    DBT_PROFILES_DIR: /opt/airflow/.dbt
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
    - ./docker/dbt:/opt/airflow/.dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    depends_on: *airflow-common-depends-on
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
